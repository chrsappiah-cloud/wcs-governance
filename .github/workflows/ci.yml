name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  stack-tests:
    name: stack-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run start &
      - run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && exit 0
            sleep 2
          done
          exit 1
      - run: npm run test:stack
        env:
          TEST_BASE_URL: http://localhost:3000

  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    needs: [typecheck, unit-tests, stack-tests]
    steps:
      - run: echo "All CI checks passed"

  cd-deploy:
    name: cd-deploy
    runs-on: ubuntu-latest
    needs: [ci-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Deploy to Vercel (primary)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Set VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID secrets to enable CD deploy"
            exit 0
          fi
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel build --prod --token="$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Deploy Firebase rules + docs hosting (backup)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Set FIREBASE_SERVICE_ACCOUNT_JSON secret to enable Firebase deploy"
            exit 0
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          npx firebase-tools deploy --only firestore:rules,hosting --non-interactive

      - name: Sync Supabase → Firestore backup
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Set FIREBASE_SERVICE_ACCOUNT_JSON and SUPABASE_SERVICE_ROLE_KEY to enable backup sync"
            exit 0
          fi
          npm run backup:firebase
